  /file/content/{id}:
    get:
      summary: Get file by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File (image or video)
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: File not found
  components:
    securitySchemes:
      bearerAuth:
        type: http
        scheme: bearer
        bearerFormat: JWT

    schemas:
      UserRequest:
        type: object
        required: [ username, password, email ]
        properties:
          username:
            type: string
          password:
            type: string
          email:
            type: string
            format: email

      User:
        type: object
        properties:
          id:
            type: string
          username:
            type: string
          email:
            type: string
            format: email

      MessageRequest:
        type: object
        required: [ sender, message ]
        properties:
          sender:
            type: string
          message:
            type: string
          fileId:
            type: string
            nullable: true

      Message:
        type: object
        properties:
          id:
            type: string
          sender:
            type: string
          message:
            type: string
          timestamp:
            type: integer
            format: int64
          fileId:
            type: string
            nullable: true

      FileResponse:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
          contentType:
            type: string


