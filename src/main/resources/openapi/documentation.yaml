openapi: "3.0.3"
info:
  title: "Chat API"
  description: "A simple chat API with user authentication and file upload/download."
  version: "1.0.0"

servers:
  - url: "http://localhost:8080"

security:
  - bearerAuth: []

paths:
  /users/register:
    post:
      description: "Register a new user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "201":
          description: "User successfully registered"
        "400":
          description: "Invalid user data"

  /users/authenticate:
    post:
      description: "Authenticate user and return a token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: "Authentication successful"
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "401":
          description: "Invalid credentials"

  /users/{username}:
    get:
      security:
        - bearerAuth: []
      description: "Retrieve a user by username"
      parameters:
        - name: "username"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "User found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: "User not found"

  /messages:
    get:
      security:
        - bearerAuth: []
      description: "Retrieve all messages"
      responses:
        "200":
          description: "List of all messages"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      security:
        - bearerAuth: []
      description: "Send a new message"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageRequest"
      responses:
        "201":
          description: "Message successfully created"
        "400":
          description: "Invalid message data"

  /upload:
    post:
      security:
        - bearerAuth: [ ]
      summary: Upload a file to GridFS
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                  file:
                    type: string
                    format: binary
                  fileName:
                    type: string
                    description: Optional filename (will be taken from multipart metadata if not present)
                  contentType:
                    type: string
                    description: Optional content type (will be inferred if not provided)
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/FileResponse"
                  - type: object
                    properties:
                      fileId:
                        type: string
        "400":
          description: Invalid upload request

  /file/{id}:
    get:
      summary: Get file by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File
          content:
            video/mp4:
              schema:
                type: string
                format: binary

  openapi: "3.0.3"
