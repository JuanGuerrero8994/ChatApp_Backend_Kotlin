openapi: "3.0.3"
info:
  title: "Chat API"
  description: "A simple chat API with user authentication and file upload/download."
  version: "1.0.0"

servers:
  - url: "http://localhost:8080"

security:
  - bearerAuth: []  # Aplica autenticación a todas las rutas por defecto

paths:
  /users/register:
    post:
      description: "Register a new user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "201":
          description: "User successfully registered"
        "400":
          description: "Invalid user data"

  /users/authenticate:
    post:
      description: "Authenticate user and return a token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                email:
                  type: "string"
                password:
                  type: "string"
      responses:
        "200":
          description: "Authentication successful"
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  token:
                    type: "string"
        "401":
          description: "Invalid credentials"

  /users/{username}:
    get:
      security:
        - bearerAuth: []
      description: "Retrieve a user by username"
      parameters:
        - name: "username"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "User found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: "User not found"

  /messages:
    get:
      security:
        - bearerAuth: []
      description: "Retrieve all messages"
      responses:
        "200":
          description: "List of all messages"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/Message"
    post:
      security:
        - bearerAuth: []
      description: "Send a new message"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageRequest"
      responses:
        "201":
          description: "Message successfully created"
        "400":
          description: "Invalid message data"

  /upload:
    post:
      security:
        - bearerAuth: [ ]
      summary: Upload a file to GridFS
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                fileName:
                  type: string
                contentType:
                  type: string
      responses:
        "201":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  fileId:
                    type: string
        "400":
          description: Invalid upload request

    /file/{fileId}:
      get:
        security:
          - bearerAuth: [ ]
        summary: Download a file from GridFS by ID
        parameters:
          - name: fileId
            in: path
            required: true
            schema:
              type: string
        responses:
          "200":
            description: File retrieved successfully
            content:
              application/octet-stream:
                schema:
                  type: string
                  format: binary
          "404":
            description: File not found


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRequest:
      type: "object"
      properties:
        username:
          type: "string"
        password:
          type: "string"
        email:
          type: "string"
          format: "email"

    User:
      type: "object"
      properties:
        id:
          type: "string"
        username:
          type: "string"
        email:
          type: "string"
          format: "email"

    MessageRequest:
      type: "object"
      properties:
        sender:
          type: "string"
        message:
          type: "string"

    Message:
      type: "object"
      properties:
        id:
          type: "string"
        sender:
          type: "string"
        message:
          type: "string"
        timestamp:
          type: "integer"
          format: "int64"
        fileUrl:
          type: "string"
          nullable: true
